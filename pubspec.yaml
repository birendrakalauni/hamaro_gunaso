name: hamaro_gunaso
description: Online Complaint Management System - Production Ready
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0

  # State Management
  provider: ^6.1.5

  # Image Handling
  image_picker: ^1.2.0
  http: ^1.2.2

  # UI & UX
  flutter_spinkit: ^5.2.1
  fluttertoast: ^8.2.12
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # Utilities
  connectivity_plus: ^7.0.0
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3

  # Icons & Graphics
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.0

  # Local Notifications
  flutter_local_notifications: ^19.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_logo2.png"
  adaptive_icon_background: "#FFFFFF"

  adaptive_icon_foreground: "assets/images/app_logo2.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: AppFont
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700